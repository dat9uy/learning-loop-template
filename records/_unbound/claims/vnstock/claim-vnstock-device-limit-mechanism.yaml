subject: vnstock vendor installer device-limit enforcement
claim: The vnstock vendor installer enforces an account-and-OS-global device limit for Linux installs; after one fresh Linux sandbox registered, a second fresh Linux sandbox could not install vnstock_data because the device was not registered.
scope: sandbox
evidence_refs:
  - local:records/vnstock/evidence/experiment-install-20260508T171112Z.md
  - local:records/vnstock/evidence/experiment-install-20260509T071800Z-sandbox-1.md
  - local:records/vnstock/evidence/experiment-install-20260509T071900Z-sandbox-2.md
confidence: medium
notes: "Operator confirmed device management UI at https://vnstocks.com/account?section=devices on 2026-05-09; sandbox-2 installer output cited this URL as the vendor-provided resolution path. Re-run experiment on 2026-05-15 with cleared slots confirmed the actual limit is 1 (Bronze), not 2 (Golden) as the installer message claims."
limitations:
  - Mechanism is inferred from sanitized vendor installer output; vendor docs mention device registration and a management UI but do not document limit semantics or tier-specific quotas.
  - Evidence isolates account-and-OS-global metering for fresh Linux Docker sandboxes under the observed bronze tier state; it does not prove behavior for other OS families, tiers, or future vendor policy.
  - Agent did not and must not perform external account device clearance.
  - "RETROSPECTIVE (2026-05-15): The installer message 'Golden 2 devices' is false. Actual limit is 1 (Bronze). See claim-vnstock-device-limit-ui-inconsistency for the re-run experiment that confirmed this with cleared slots."
