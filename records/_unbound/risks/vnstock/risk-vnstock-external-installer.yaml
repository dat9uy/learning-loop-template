id: risk-vnstock-external-installer
schema_version: "1.0"
type: risk
status: active
created_at: "2026-05-08T00:00:00Z"
updated_at: "2026-05-14T17:13:16Z"
source_refs:
  - local:records/vnstock/evidence/installer-prior-notes.md
  - local:records/vnstock/evidence/vendor-installation-troubleshooting-guide.md
  - local:records/vnstock/evidence/vendor-dockerfile-sample.md
