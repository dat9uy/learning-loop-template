notes: >
  Proposed experiment triggered by vendor doc analysis (2026-05-13).
  Two related questions: (1) Does the vendor-documented one-liner install command work in a fresh sandbox?
  (2) Does a pre-created venv at /opt/venv cause the installer to use it instead of creating $HOME/.venv?
  Both questions arise from discrepancies between vendor documentation and our prior sandbox observations.
goal: >
  Verify the vendor-documented non-interactive one-liner install command and test whether
  a pre-created virtual environment at /opt/venv is respected by the Makeself installer.
hypothesis: >
  (1) The vendor one-liner `wget -q ... && chmod +x ... && echo "2" | ./installer.run --quiet --accept -- --api-key "$VNSTOCK_API_KEY"`
  will succeed in a fresh sandbox because `--` correctly passes flags through the Makeself wrapper to the inner installer.
  (2) If a venv is pre-created at /opt/venv and PATH is set accordingly, the installer will install sponsor packages into
  /opt/venv rather than creating a new venv at $HOME/.venv.
method:
  - Verify VNSTOCK_API_KEY is present in inherited environment without printing.
  - Start a fresh python:3.11-slim Docker container.
  - Run the vendor one-liner command exactly as documented.
  - Capture install exit code, registration status, and vnstock_data import result.
  - Start a second fresh container with a pre-created /opt/venv and PATH set.
  - Run the same one-liner in the second container.
  - Inspect whether vnstock_data exists in /opt/venv or in $HOME/.venv.
  - Audit temp files for secret material.
  - Remove both containers.
success_metrics:
  - one-liner-exit-code-zero
  - device-registration-succeeds
  - vnstock-data-import-succeeds
  - venv-location-determined-for-pre-created-case
  - temp-root-cleaned-with-container
  - metadata-captured
result: does-not-support
result_reason: >
  Hypothesis 1 (one-liner succeeds in fresh sandbox) is contradicted: the Makeself flag passthrough works,
  but the inner installer fails immediately with ModuleNotFoundError: No module named 'requests'.
  Hypothesis 2 (pre-created /opt/venv is respected) is inconclusive: the installer fails before reaching
  venv creation, so venv path behavior cannot be determined.
agent_outcome: >
  The vendor one-liner syntax is correct, but the vendor documentation omits the prerequisite that
  requests must be pre-installed. This is corroborated by the vendor Dockerfile sample which lists
  requests>=2.31.0 in its pre-install dependency list. The experiment also observed an unexpected
  installer SHA-256 change (vendor does not publish checksums).
product_outcome: none
observations:
  - The Makeself wrapper correctly passes -- --api-key to the inner installer.
  - The inner installer fails before venv creation with ModuleNotFoundError: No module named 'requests'.
  - No device registration was attempted; device-limit gate was not reached.
  - Pre-created /opt/venv did not cause the installer to use it (installer failed earlier).
  - Installer SHA-256 changed from the previously pinned value.
promotion_review:
  - If one-liner succeeds, update claim-vnstock-install-sandbox to remove the archive-wrapper flag limitation.
  - If pre-created /opt/venv is respected, update the two-stage bootstrap script to pre-create the venv at the target path.
  - If either hypothesis fails, document the discrepancy in a new evidence record and retain the current limitations.
