constraint_type: write-path
constraint: records-evidence
description: >
  Authorize agent writes to records/evidence/** for runtime verification artifacts.
  Evidence files are required by plan phases (e.g., fundamental capability closeout).
  Operator retains ownership of evidence content; agent drafts, operator validates.
  This observation eliminates friction so agents do not need to AskUserQuestion
  on every evidence file write during plan execution.
