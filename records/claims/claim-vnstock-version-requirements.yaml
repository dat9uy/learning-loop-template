  - record:experiment-vnstock-install-prepared-substrate-20260513T173104Z
notes: >
  Draft claim created by operator based on vendor documentation and observed install behavior.
  Vendor Dockerfile sample lists vnstock>=3.3.0 as a pre-install dependency, but our sandbox
  observation shows vnstock 4.0.2 being resolved. The vnstock_data>=3 assertion is based on
  vendor FAQ and troubleshooting guide references to sponsor package tiers.
  This claim requires a future experiment that successfully installs sponsor packages
  (i.e., clears device limit) to verify the vnstock_data version.
subject: vnstock and vnstock_data Python package versions
claim: >
  A standard vendor installer run (non-interactive, with valid API key, under device limit)
  produces vnstock>=4 and vnstock_data>=3. The free vnstock package resolves to 4.x,
  and the sponsor-tier vnstock_data package resolves to 3.x or higher.
scope: sandbox
evidence_refs:
  - local:records/evidence/vnstock-data/vendor-dockerfile-sample.md
  - local:records/evidence/vnstock-data/vendor-installation-troubleshooting-guide.md
  - local:records/evidence/vnstock-data/experiment-install-prepared-substrate-20260513T173104Z.md
confidence: low
limitations:
  - vnstock_data version is unverified because device limit blocked sponsor package installation in all sandbox experiments.
  - Vendor does not publish version manifests or checksums for the installer or its payload.
  - Version resolution may change as the vendor publishes new releases.
  - Claim is based on a single observation (vnstock 4.0.2) plus vendor doc inference; not statistically validated.
approval:
