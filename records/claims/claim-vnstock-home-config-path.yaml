notes: "Discovered during Phase-04 revalidation. vnstock_data reads api_key.json via Path.home()/.vnstock/, not via VNSTOCK_CONFIG_PATH env var. When HOME is unset or points elsewhere, all API calls fail with Vietnamese auth error even though package is installed and device registered."
subject: vnstock_data requires HOME=product/api to find api_key.json
claim: "vnstock_data reads $HOME/.vnstock/api_key.json via Path.home(). The VNSTOCK_CONFIG_PATH env var is NOT used by vnstock_data for config resolution. When HOME defaults to the shell user's home (e.g., /home/datguy), vnstock_data cannot find the installed api_key.json and all API calls fail with 'Không tìm thấy thông tin người dùng hợp lệ'. Capability scripts must set os.environ['HOME'] to product/api before importing vnstock_data."
scope: sandbox
evidence_refs:
  - local:records/evidence/vnstock-data/capability-revalidation-20260518.md
confidence: high
limitations:
  - Only tested with vnstock_data 3.1.8 (source version 3.0.0). Newer versions may change config resolution.
  - VNSTOCK_CONFIG_PATH is set by install-vnstock.sh but ignored by vnstock_data for api_key.json lookup.
  - The .vnstock directory also contains device.id, auth_state.json, and other config that may also require correct HOME.
