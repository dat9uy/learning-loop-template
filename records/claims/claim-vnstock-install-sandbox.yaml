limitations:
  - Verification is limited to sandbox installation and metadata-only import checks.
  - Production use and live provider calls require separate approval.
  - The vendor one-liner (`--quiet --accept -- --api-key`) requires `requests` to be pre-installed in the substrate; the vendor troubleshooting guide omits this prerequisite while the vendor Dockerfile sample includes it. The one-liner succeeds in prepared substrates (requests/pandas pre-installed) and reaches device registration.
  - The Makeself archive-wrapper flag passthrough has been independently verified in our sandbox.
  - "The installer unconditionally creates a venv at $HOME/.venv. When HOME is not overridden, this defaults to /root/.venv. When HOME is overridden (as in the bootstrap script), the installer respects it and creates .venv in the specified home directory."
  - The vendor Dockerfile assumption that `/opt/venv` will be used is incorrect; venv path override via `PATH` or pre-created venvs is not supported by the installer.
  - "The bootstrap script product/api/scripts/install-vnstock.sh is validated: the product .venv (requests + pandas) is a sufficient substrate, and the HOME override works as intended."
  - "vnai does NOT need to be pre-installed in the substrate; the installer handles vnai/vnii installation itself."
  - "Full vendor install confirmed: with a free device slot, the installer exits 0 and installs vnstock_data 3.0.0."
  - "Device IDs are not deterministic across container instances; each fresh container consumes a distinct device slot."
  - "Direct pip install from the vendor index is not viable; the index is a web UI, not a PEP 503 simple index."
  - "The product is already bootstrapped and the bootstrap script is idempotent (skips when vnstock_data is already importable)."
  - "RETROSPECTIVE (2026-05-15): The vendor installer falsely claims 'Golden package, 2 devices' in its error message. The actual tier is Bronze with a 1-device limit. Every experiment that hit device limit was hitting the 1-device ceiling. See claim-vnstock-device-limit-ui-inconsistency."
