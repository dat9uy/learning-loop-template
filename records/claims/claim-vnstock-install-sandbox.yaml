limitations:
  - Verification is limited to sandbox installation and metadata-only import checks.
  - Production use and live provider calls require separate approval.
  - The 2026-05-08 sandbox install experiment did not support the planned archive-wrapper flag and pre-existing config-file assumptions.
  - Vendor docs confirm non-interactive mode via env vars and a `--quiet --accept -- --api-key` one-liner, but the exact Makeself archive-wrapper flag passthrough behavior has not been independently verified in our sandbox.
  - Vendor Dockerfile pre-creates a venv at /opt/venv; our sandbox observed installer always creating $HOME/.venv regardless of VNSTOCK_VENV_PATH. This venv-path discrepancy remains unresolved.
