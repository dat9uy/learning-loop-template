confidence: medium
limitations:
  - Verification is limited to sandbox installation and metadata-only import checks.
  - Production use and live provider calls require separate approval.
  - The vendor one-liner (`--quiet --accept -- --api-key`) requires `requests` to be pre-installed in the substrate; the vendor troubleshooting guide omits this prerequisite while the vendor Dockerfile sample includes it. The one-liner succeeds in prepared substrates (requests/vnai/pandas/numpy pre-installed) and reaches device registration.
  - The Makeself archive-wrapper flag passthrough has been independently verified in our sandbox.
  - The installer unconditionally creates a venv at `/root/.venv` regardless of pre-created `/opt/venv` or PATH settings. The vendor Dockerfile assumption that `/opt/venv` will be used is incorrect; venv path override is not supported by the installer.
