subject: vnstock Python package
claim: vnstock may be installable and importable in a sandbox environment by downloading and executing the official Makeself .run installer; the env-var-driven noninteractive install path is verified in sandbox and corroborated by vendor documentation, while the exact archive-wrapper flag syntax remains partially discrepant
