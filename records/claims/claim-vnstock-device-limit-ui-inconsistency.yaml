subject: vnstock vendor device limit enforcement
claim: >
  The vnstock vendor misrepresents both tier and device limit in its installer
  messaging. The installer claims "Golden package, 2 devices per OS" but the
  actual account tier is Bronze with a 1-device limit. Additionally, the vendor's
  definition of "failure" is asymmetric: device registration succeeds and consumes
  a slot, while only the sponsor package download is blocked. The web UI correctly
  shows the registered device but does not reveal the true limit or warn that
  a "failed" install still consumed a slot. Furthermore, the vendor's "clear device"
  operation is a soft delete: the device record is hidden from the UI but not purged
  from the backend. If the same host/device fingerprint later re-authenticates
  (e.g., via `import vnstock_data` with expired auth cache), the vendor restores
  the hidden record, making it visible again and counting it as occupied.
scope: sandbox
evidence_refs:
  - local:records/evidence/vnstock-data/experiment-bootstrap-critique-rerun-20260514T171316Z.md
confidence: high
limitations:
  - "Observed on a single Golden-tier account; may not generalize to other tiers."
  - "Vendor backend behavior is opaque; exact counting mechanism is unknown."
  - "Host OS fingerprinting may cause the vendor to count the host separately from Docker containers."
  - "No API available to query true slot consumption; inference is indirect."
