question: Should the verified vnstock_data Reference slice be approved for a scoped product build?
decision: Approve a product build limited to the Reference equity list, company info, and symbol search surfaces.
rationale: The install and runtime dimensions for the sandbox vnstock_data claim are verified, and the build is bounded to metadata-safe Reference surfaces with blocked raw-data and credential capture.
alternatives:
  - Defer product build until additional Reference methods are verified.
  - Keep the work as capability scripts only without product surfaces.
tradeoffs:
  - Approval enables the reference product slice while preserving live-call and raw-data restrictions.
  - Scope remains narrow and excludes production deployment.
supersedes: []
decision_effect:
  action: approve
  scope: product
  affected_refs:
