    - record:claim-product-fastapi-reference
    - record:claim-product-tanstack-reference-view
  boundaries:
    allowed_actions:
      - build Reference slice only
      - run metadata-only endpoint checks
      - run fixture-backed web smoke tests
    blocked_actions:
      - live-provider-calls
      - credential-capture
      - raw-data-export
      - production-deployment
    required_gates:
      - preflight-import-only
      - pytest-api-suite
      - web-smoke-tests
      - records-validation
