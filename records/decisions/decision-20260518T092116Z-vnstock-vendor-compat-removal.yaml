id: decision-20260518T092116Z-vnstock-vendor-compat-removal
schema_version: "1.0"
type: decision
status: approved
created_at: "2026-05-18T09:21:16Z"
updated_at: "2026-05-18T09:24:57Z"
source_refs:
  - record:experiment-vnstock-vendor-compat-removal-20260518T014500Z
  - local:records/evidence/vnstock-data/capability-revalidation-20260518.md
  - record:claim-vnstock-runtime-403-root-cause
  - record:claim-vnstock-version-requirements
notes: >
  Closes the runtime limitation on claim-vnstock-runtime-403-root-cause only.
  The product dimension on that claim remains claimed (pending FastAPI Reference
  Build close-out) and is NOT superseded by this decision. Also updates
  claim-vnstock-version-requirements to reflect that vendor_compat is no longer
  a version requirement.
question: >
  Should the vendor_compat Device-Id injection shim be formally removed from
  the vnstock product slice, or kept in _archived with a quarantine window?
decision: >
  Remove vendor_compat from active code. Delete the stale imports in main.py
  and both test files. Delete the _archived/vendor_compat/ directory. No
  quarantine window — the approved experiment already proved the shim is
  unnecessary for vnstock_data 3.1.8.
rationale: >
  The approved experiment (experiment-vnstock-vendor-compat-removal-20260518T014500Z)
  proved that vnstock_data 3.1.8 authenticates via api_key.json alone and all
  6 API calls succeed without Device-Id injection. The _archived/vendor_compat/
  directory is dead code. main.py:5, test_vci_smoke.py:13, and
  test_reference.py:24,71-76 still hold stale imports and assertions that would
  fail at runtime or produce false negatives in tests. Cleaning them up now
  prevents silent import errors and keeps the codebase consistent with the
  proven architecture.
alternatives:
  - >
    Keep vendor_compat in _archived/ with a 30-day quarantine window.
    Rejected — the experiment already proved the shim is obsolete; keeping it
    is dead weight and the stale imports cause immediate test/runtime failures.
  - >
    Only archive vendor_compat but leave stale imports in main.py and tests.
    Rejected — stale imports cause import-time and test failures; the removal
    must be complete.
  - >
    Re-introduce vendor_compat later if the vendor changes auth again.
    This is BLOCKED by blocked_actions below; any future re-introduction
    requires a new approved decision.
tradeoffs:
  - >
    Future vendor auth changes may require re-implementing Device-Id injection.
    Mitigation: git history preserves the shim at commit 363b731; a new
    approved decision would be required to reactivate.
  - >
    Removing the test assertions for Device-Id headers eliminates test coverage
    for that specific header. Mitigation: the vendor no longer requires it;
    runtime tests cover the actual auth path.
  - >
    Deleting _archived/vendor_compat/ removes the "soft archive" boundary.
    Mitigation: git history preserves the code; operator explicitly chose
    "delete now" over quarantine.
supersedes: []
decision_effect:
  action: approve
  scope: runtime
  affected_refs:
