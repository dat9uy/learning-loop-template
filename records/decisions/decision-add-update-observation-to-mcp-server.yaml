id: decision-add-update-observation-to-mcp-server
schema_version: "1.0"
type: decision
status: approved
created_at: "2026-05-21T00:00:00Z"
updated_at: "2026-05-21T01:30:00Z"
source_refs:
  - record:capability-fastapi-reference-rest
question: Should the constraint-gate MCP server expose an update_observation tool to toggle existing observation status?
decision: Yes. Add an update_observation MCP tool that scans observation files by id, updates status and updated_at atomically, and re-validates path safety before write.
rationale: >
  The existing record_observation tool only creates new observations with hardcoded status: active
  and rejects duplicates. There is no MCP-native path to toggle an existing observation's status
  (active/inactive/archived). This forces operators to use Bash (bypasses gate abstraction) or
  manual file edits (high friction). Closing this gap keeps the MCP protocol self-contained.
alternatives:
  - "Use Bash/sed to edit observation files directly. Rejected: circumvents write gate, breaks abstraction, and is error-prone."
  - "Add an update flag to record_observation. Rejected: violates single-responsibility; record_observation semantically means 'create'."
  - "Require operator to delete and re-create observation. Rejected: loses created_at, history, and source_refs."
tradeoffs:
  - "MCP tool bypasses write gate by design (separate process using node:fs). Accepted: MCP server is the authorized write surface for observations; gate protects operator-initiated edits, not the MCP tool itself."
  - "Any MCP client can inactivate observations. Accepted: MCP clients are trusted by definition; untrusted clients should not have MCP access."
  - "Atomic write with temp file adds a small I/O cost. Accepted: safety outweighs cost."
supersedes: []
decision_effect:
  action: approve
  scope: product
  affected_refs:
    - tools/constraint-gate/observation-writer.js
    - tools/constraint-gate/server.js
    - tools/constraint-gate/observation-writer.test.js
    - tools/constraint-gate/server.test.js
  boundaries:
    allowed_actions:
      - add updateObservation function to observation-writer.js
      - register update_observation tool in server.js
      - mutate only status, updated_at, and notes fields
      - atomic write with unique temp suffix and path re-validation
    blocked_actions:
      - modify existing record_observation or check_gate behavior
      - change observation schema version
      - expose file-system path in MCP tool response
      - allow status values outside active/inactive/archived
    required_gates:
      - node --test tools/constraint-gate/observation-writer.test.js
      - node --test tools/constraint-gate/server.test.js
      - pnpm validate:records
      - pnpm check
