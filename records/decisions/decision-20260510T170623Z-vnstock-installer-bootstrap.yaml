  boundaries:
    allowed_actions:
      - Drop the optional vendor extra from product/api/pyproject.toml.
      - Author product/api/scripts/install-vnstock.sh with SHA-pinned download and idempotent post-flight import check.
      - Wire pnpm bootstrap:api to chain uv sync followed by the install-vnstock script.
      - Update living docs (operator guide, product README, capability README) to reference pnpm bootstrap:api in place of uv sync --extra vendor.
      - Rotate the installer SHA pin only after a sandbox-1-style experiment record proves the new installer behaves.
    blocked_actions:
      - Editing frozen historical records (experiment-vnstock-capabilities-20260509T174957Z, capability-runtime-output.md, docs/journals/260510-vnstock-capability-runtime.md).
      - Auto-running stage 2 from a pnpm install postinstall hook or any non-explicit operator command.
      - Performing vendor device clearance from inside the bootstrap script.
      - Bumping the pandas floor in pyproject.toml without a re-verify sandbox experiment.
      - Citing local:product/api/scripts/install-vnstock.sh from non-capability record source_refs per the per-record-type allowlist in decision-20260510T160000Z-capabilities-stack-migration.
    required_gates:
      - pnpm validate:records
      - pnpm check
      - product/api/.venv/bin/python imports vnstock_data successfully after a fresh pnpm bootstrap:api run on a deleted .venv
