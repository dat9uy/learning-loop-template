notes: Draft follows plans/reports/brainstorm-20260510-capabilities-stack-migration.md; post-migration evidence is added after validation.
question: Where should capability scripts live, and which record type may cite local capability script code?
decision: Use product/<stack>/capabilities/<scope>/ for capability scripts. Permit local:product/*/capabilities/... only for capability records.
rationale: Per-stack homes keep runtime dependencies isolated while a per-record-type validator table preserves the existing default-deny source boundary.
alternatives:
  - Keep product/capabilities/<scope>/ and accept mixed runtime tooling.
  - Hard-code product/api/capabilities and product/web/capabilities in the validator.
  - Add stack-manifest enforcement to the validator now.
tradeoffs:
  - Single-segment glob matching is enough for current stack layout but defers nested stack packages.
  - Stack manifest enforcement remains a review convention, not a validator rule.
supersedes: []
decision_effect:
  action: approve
  scope: schema-improvement
  affected_refs:
