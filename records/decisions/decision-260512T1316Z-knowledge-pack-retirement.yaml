notes: Supersedes the May-10 draft deferral posture without editing that draft record. Predecessor plan plans/260512-1915-source-ref-uri-pattern-schema-adoption/ adopted the source_ref URI pattern that this decision narrows by removing pack. Scout report plans/reports/problem-solving-260512-1714-validate-records-simplification.md identified Phase B Cascades 6 and 7; retirement absorbs them by deletion instead of schematizing a dormant lane. The supersedes graph is the disposition signal for decision-20260510T174640Z-knowledge-pack-lane-deferral, which intentionally remains status draft.
question: Should the knowledge-pack lane be retired in full, or maintained in the deferred-quiet state recorded in decision-20260510T174640Z?
decision: Retire the knowledge-pack lane in full. Delete the three pack-specific validator/doc-generation modules, delete knowledge-packs/, delete eleven pack-related negative fixtures, remove pack from the source_refs URI pattern in five record schemas, remove knowledge_pack_ids from the experiment schema and existing experiment records, remove pack-related validator allowlist plumbing, and drop pack-as-active-concept guidance from README.md, charter.md, operator-guide.md, red-team-review.md, and the project-local learning-loop skill docs. Do not edit decision-20260510T160000Z because its YAML text does not carry the knowledge-packs token. Do not edit decision-20260510T174640Z; it stays draft and this approved superseding decision carries the disposition.
rationale: The operator chose retirement over latent infrastructure. Audit found no in-flight pack:<id> source_refs across records, and all current experiment knowledge_pack_ids fields are empty arrays. Cleanup is bounded because the lane is already inert; keeping it would preserve validator complexity and agent-facing guidance for a concept no current product line uses.
alternatives:
  - Keep the 174640Z deferral posture and schematize pack files as Cascade 6. Rejected because it adds schemas and validator complexity for a lane no current product line uses.
  - Hard-archive knowledge-packs/ under records/_archive/. Rejected because the post-retirement state should expose zero active or latent pack surface.
  - Re-approve the status quo deferral as reviewed. Rejected because the operator has chosen retirement.
tradeoffs:
  - Future product lines that want packs must restore schema alternatives, validator modules, fixtures, and docs under a new approved decision.
  - Git history preserves the pre-retirement implementation if a future plan needs to recover details.
  - Removing pack from the AJV source_refs pattern makes accidental revival fail validation until deliberately reauthorized.
  - Skill and operator docs will no longer teach agents to reach for pack workflows.
