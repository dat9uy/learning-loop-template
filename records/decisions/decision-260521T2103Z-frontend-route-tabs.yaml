  boundaries:
    allowed_actions:
      - create /fundamental/$symbol route
      - build tabbed UI with 4 statement types
      - reuse DataFrameEnvelope type pattern from reference client
      - use plain React + CSS (no external UI library)
    blocked_actions:
      - add external UI library dependencies
      - create nested sub-routes per tab
      - use virtualized rendering unless tables exceed 100 rows
    required_gates:
      - pnpm check
      - web-smoke-tests
      - pnpm validate:records
