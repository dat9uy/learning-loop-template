notes: Meta/loop architecture decision, not domain evidence. The decision schema scope enum lacks a meta value; this record uses schema-improvement as the closest available scope and records the deviation here. Driving brainstorm report lives at plans/reports/brainstorm-260512-1310-artifact-timestamp-unification.md, outside the records/evidence local-ref allowlist, so it is cited here rather than as a source_ref. This decision also updates the meta-evidence self-improvement doc convention examples.
question: What is the unified filename timestamp convention for learning-loop artifacts, and which artifact types should be timestamped?
decision: Event-like artifacts (decisions, experiments, risks, run-specific domain evidence MDs) use the short-year compact format YYMMDDTmmZ (e.g. 260512T1321Z). State-like artifacts (claims, capabilities) and meta-evidence MDs remain timeless (no timestamp in filename). New conventions apply prospectively; existing pre-convention files are not renamed.
rationale: The corpus had four distinct timestamp formats across artifact filenames; no timestamp, date-only (YYYYMMDD), full ISO datetime (YYYYMMDDThhmmssZ), and short-year compact (YYMMDDTmmZ). Decisions and experiments are temporal events; their identity includes when they occurred. Claims and capabilities represent ongoing state; their identity is semantic. Meta-evidence is policy documentation per the meta-governance rule (descriptive-kebab-slug, no timestamp). The short-year compact format is already used in the most recent meta artifacts (decision-260512T0046Z, experiment-meta-install-template-candidate-260512T0046Z) and is compact, lexicographically sortable, and collision-safe at minute granularity.
alternatives:
  - Full ISO datetime (YYYYMMDDThhmmssZ) for all timestamped artifacts. Rejected because 16 characters is excessive for daily authoring; the short-year format is sufficient for the project horizon.
  - Date-only (YYYYMMDD) for all timestamped artifacts. Rejected because same-day collisions are likely when multiple experiments or decisions are authored in one session.
  - Timestamp every artifact type including claims and capabilities. Rejected because claims and capabilities are state declarations that evolve over time; adding timestamps to their filenames would break semantic identity and make cross-references harder to read.
  - Retroactively rename all existing artifacts to the new format. Rejected per record:decision-20260509T192449Z-prospective-convention-application; per-experiment immutability beats convention uniformity.
tradeoffs:
  - The short-year format has a ~70-year horizon before year ambiguity. Mitigation - the project operates in 2026; this is acceptable.
  - Historical files will visibly diverge from the new convention. Mitigation - prospective application is already established policy.
  - Agents must learn the new format; existing prompts may need updating. Mitigation - operator-guide and meta-evidence docs are updated in this decision's scope.
