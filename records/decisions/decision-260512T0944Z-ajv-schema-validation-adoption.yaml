notes: "Brainstorm reports live at plans/reports/brainstorm-260512-1534-ajv-schema-validation-scope.md and plans/reports/brainstorm-260512-1357-parser-swap-ajv-deferral.md; implementation plan lives at plans/260512-1534-ajv-schema-validation-swap/plan.md; predecessor plan lives at plans/260512-1410-yaml-parser-library-swap/plan.md. plans/ is outside source_refs allowlist, so those paths are cited here. Motivating commit: e2a82d6. experiment-meta-install-template-candidate-260512T0046Z.yaml and related local-time records had YAML field timestamps normalized to UTC-Z without filename renames; filename convention remains governed by decision-260512T1321Z."
question: Should the hand-rolled validateSchema implementation in tools/validate-records/record-validation-rules.js be replaced by AJV 2020 so declared JSON Schema 2020-12 rules are enforced by a maintained validator?
decision: Replace validatePrimitive and validateSchema with AJV 2020 using strict:true and allErrors:true. Add UTC-Z pattern enforcement to schema timestamp fields. Keep validateClaimVerification, validateSourceRefs, validateExperimentPacks, and validateRecordReferences hand-rolled because they encode ledger and cross-record rules rather than JSON Schema grammar.
rationale: The project declared JSON Schema 2020-12 but enforced only a small hand-rolled subset. AJV dry-run surfaced silent passes for date-only timestamps, local timezone timestamp forms, missing $ref-resolved required fields, and missing required fields inside array items. JSON Schema validation grammar is solved upstream; project code should own project-specific ledger semantics, not a partial schema engine.
alternatives:
  - Extend validatePrimitive and validateSchema to support pattern, $ref, nested item required fields, and future schema keywords. Rejected because that recreates a validator inside project tooling.
  - Keep hand-rolled validation and document timestamp expectations. Rejected because it keeps the validator silently weaker than the schemas.
  - Add ajv-formats and use format date-time. Rejected for this change because a literal UTC-Z pattern is hermetic and matches the existing record policy without adding another dependency.
  - Add additionalProperties false across schemas in the same change. Rejected as scope creep; strict AJV mode validates schema keyword correctness, not data extra-property policy.
tradeoffs:
  - Validator error text changes to AJV-native wording. Negative fixtures now assert behavior with AJV-compatible substrings.
  - package.json and pnpm-lock.yaml gain AJV as a runtime tooling dependency.
  - Existing records needed timestamp normalization before the engine swap could land cleanly.
  - Native AJV errors are intentionally not translated back to the old messages, avoiding an adapter that would grow with every schema keyword.
supersedes: []
decision_effect:
  action: approve
  scope: schema-improvement
  affected_refs:
    - local:tools/validate-records/record-validation-rules.js
    - local:schemas/claim.schema.json
    - local:schemas/experiment.schema.json
    - local:schemas/decision.schema.json
    - local:schemas/capability.schema.json
    - local:schemas/risk.schema.json
  boundaries:
    allowed_actions:
      - Replace hand-rolled JSON Schema validation with AJV 2020 strict mode.
      - Add UTC-Z pattern enforcement to created_at, updated_at, and claim approval reviewed_at schema fields.
      - Normalize existing record timestamp field values to canonical UTC-Z form.
      - Update negative fixture assertions to AJV-native validation wording.
    blocked_actions:
      - Renaming record filenames as part of YAML field timestamp normalization.
      - Adding ajv-formats in the same change.
      - Adding additionalProperties false across schemas in the same change.
      - Replacing ledger, local-source, pack, claim-verification, or cross-record validators with schema-only rules.
    required_gates:
      - pnpm validate:records
      - pnpm check
      - Temporary smoke record with +07:00 timestamp must fail with an AJV pattern error and be removed before commit.
