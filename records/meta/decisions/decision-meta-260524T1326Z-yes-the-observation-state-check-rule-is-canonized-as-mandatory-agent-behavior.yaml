question: Should agents check records/observations/ before asking the user about
  external system state?
decision: Yes. The observation-state-check rule is canonized as mandatory agent behavior.
rationale: Observations are operator-managed and more reliable than agent memory
  or user recall. Agents skipping this layer causes redundant questions and
  potential state confusion.
alternatives:
  - Leave as best-practice suggestion
  - Rely on operator-guide alone without skill reference enforcement
tradeoffs:
  - Agent friction (one more check) vs accuracy
  - Cannot mechanically enforce agent behavior, only guide it
