source_refs:
  - record:assertion-meta-static-mcp-no-delete-tool
question: Should the MCP CRUD tools be completed with source_refs on update,
  verification on experiment update, source_refs validation at creation, and a
  delete_record tool?
decision: Yes. All 5 MCP CRUD gaps shall be closed to make MCP-first record
  access mechanically sound.
rationale: The loop advertises MCP-first record access but the CRUD tools are
  incomplete. Agents either leave validation errors, ask the operator, or bypass
  the gate with Bash. Closing these gaps removes systematic tension.
alternatives:
  - Leave gaps as-is and document workarounds
  - Remove MCP tools and allow direct file writes
tradeoffs:
  - Implementation effort vs ongoing operator friction
  - Delete tool risk vs no cleanup path for draft records
supersedes: []
decision_effect:
  action: approve
  scope: schema-improvement
  affected_refs:
    - tools/coordination-gate/mcp/tools/update-decision-record-tool.js
    - tools/coordination-gate/mcp/tools/update-experiment-record-tool.js
    - tools/coordination-gate/mcp/tools/create-decision-record-tool.js
    - tools/coordination-gate/mcp/tools/create-experiment-record-tool.js
    - tools/coordination-gate/mcp/tools/create-risk-record-tool.js
    - tools/coordination-gate/mcp/tools/delete-record-tool.js
  boundaries:
    allowed_actions:
      - Add source_refs to update tools
      - Add verification block to update experiment
      - Validate source_refs at creation time
      - Add delete_record tool with authorization
    blocked_actions:
      - No retroactive changes to historical records
      - No removal of existing MCP tools
    required_gates:
      - validate:records after each tool change
      - integration tests before merge
