question: Should the N=1 vs N>=2 gap classification be enforced in the
  meta-evidence workflow?
decision: Yes. All new meta-evidence MUST classify itself by sample-count requirement.
rationale: N=1 gaps close via principle adoption; N>=2 gaps need repeated cases
  before canonization. Without classification, agents defer or close gaps
  inconsistently.
alternatives:
  - Leave classification as informal heuristic
  - Require experiments for all gaps regardless of sample count
tradeoffs:
  - Lightweight process vs rigor
  - Some N=1 gaps may need revisit if principle proves wrong
