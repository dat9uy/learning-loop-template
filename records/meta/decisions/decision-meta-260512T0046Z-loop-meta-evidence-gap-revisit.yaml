notes: Meta/loop architecture decision, not domain evidence. Pairs with the open meta-experiment under records/experiments/. The decision schema scope enum lacks a meta value, so this record uses schema-improvement as the closest available scope and records the deviation here. Source brainstorm lives at plans/reports/brainstorm-260512-0046-install-template-and-capability-schema-gap-revisit.md and the driving plan lives at plans/260512-0046-meta-evidence-gap-revisit/, both outside the records/evidence local-ref allowlist, so they are cited here rather than as source_refs.
question: How should the loop resolve the install-experiment-template gap (N=2 trigger exceeded) and the capability-schema gap (N>=3 trigger not yet met) while keeping the YAML parser swap decision independent?
decision: Accept the install experiment template candidate at draft status, recognize partial supersession of the capability schema gap, defer field enrichment until N>=3 verified packs land, and keep the YAML parser swap decision on an independent track.
rationale: The brainstorm convergence table showed three of four vnstock install evidence MDs share a stable seven-section body envelope and eleven-key frontmatter, with the fourth case classified as pre-convention legacy; the candidate template captures that envelope without forcing case-specific add-ons (Static Dimension Consistency, Process-Side Findings, Supersedes, legacy Allowed/Blocked Outputs) into the required set. For the capability schema gap, the existing schema took a map-oriented shape (stack plus surface plus a maps array) during the capabilities-stack migration documented in decision-20260510T160000Z-capabilities-stack-migration, while the gap MD still listed predicate-oriented fields, producing real structural drift that this decision records as partial supersession rather than untouched-to-do.
alternatives:
  - Bundle the parser-swap and ajv adoption into this scope. Rejected because the parser-swap draft (decision-20260510T172056Z-yaml-parser-library-swap) explicitly defers ajv to a follow-up brainstorm, and bundling forces a posture shift that the parser-swap decision has not yet absorbed.
  - Defer both gaps strictly without authoring artifacts. Rejected because Gap 1 MD would mislead future agents into thinking the N=2 trigger had not yet fired, and Gap 2 MD would continue to advertise a predicate-oriented field set that the current schema has structurally replaced.
  - Draft an enriched capability schema now. Rejected because the N>=3 verified-packs trigger is not met and forcing description, method, and prerequisites onto a maps-oriented shape would re-litigate a settled axis change without data.
tradeoffs:
  - The candidate template may need revision after the next non-vnstock install experiment lands; if a new required section emerges, the meta-experiment must be re-run before promotion.
  - Both gap MDs now carry mixed status (preserved history plus resolution or supersession notes), which requires careful reading; mitigation is the explicit historical-note pointers added in each MD.
  - Scope enum deviation — the meta-experiment and this decision use schema-improvement rather than a dedicated meta value, recorded in notes; if the loop grows enough meta artifacts, a follow-up decision can extend the scope enum.
  - The YAML parser swap decision continues on an independent track; if it later flips to bundled scope, that flip must not retroactively absorb either gap into its scope.
