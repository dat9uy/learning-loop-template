  boundaries:
    allowed_actions:
      - >
        Add "deprecated": true and an updated description to schemas/claim.schema.json
        pointing at this decision record.
      - >
        Create schemas/index-entry.schema.json for the new extracted-assertion record type.
      - >
        Create the records/index/ directory with .gitkeep.
      - >
        Extend tools/validate-records/ to recognize records/index/ YAMLs and validate them
        against index-entry.schema.json.
      - >
        Update docs/record-system-architecture.md to document the new records/index/ entity
        and frozen-legacy claims.
    blocked_actions:
      - >
        Creating new claim YAMLs in records/claims/ after this decision. Any new assertion
        must go through evidence ## Findings and the extraction tool into records/index/.
      - >
        Editing the verification block or assertion text of existing frozen-legacy claims.
        They remain read-only as historical audit trail.
      - >
        Removing records/claims/ or the 10 existing claim files. Frozen-legacy status
        preserves them for historical reference and N-counting audit.
    required_gates:
      - pnpm validate:records
      - pnpm check
