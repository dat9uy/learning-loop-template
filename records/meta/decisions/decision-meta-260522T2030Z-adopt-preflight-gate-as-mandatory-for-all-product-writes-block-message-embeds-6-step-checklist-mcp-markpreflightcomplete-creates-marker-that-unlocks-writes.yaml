question: Should preflight gate be mandatory for product/** writes?
decision: Adopt preflight gate as mandatory for all product/** writes. Block
  message embeds 6-step checklist; MCP mark_preflight_complete creates marker
  that unlocks writes.
rationale: "Three sessions demonstrated the same failure: /ck:cook builds
  product code without producing loop artifacts. Negative-only gates are
  insufficient. The preflight gate's positive contract was proven effective by
  the successful macro layer implementation (experiment-product-260522T2020Z),
  which created a decision record and completed preflight before writing any
  product code. The previous failed attempt
  (experiment-product-macro-cook-no-loop-20260522T055121Z) had no gate enforcing
  this sequence."
alternatives:
  - Keep decision-records-only gate
  - Add skill wrapper around /ck:cook
  - Rely on agent self-discipline
tradeoffs:
  - 30-min TTL requires re-preflight
  - Block message verbosity vs clarity
  - MCP tool dependency vs direct file writes
