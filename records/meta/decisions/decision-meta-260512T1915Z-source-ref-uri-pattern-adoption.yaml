id: decision-260512T1915Z-source-ref-uri-pattern-adoption
schema_version: "1.0"
type: decision
status: approved
created_at: "2026-05-12T19:15:00Z"
updated_at: "2026-05-12T19:15:00Z"
source_refs:
  - record:decision-260512T0944Z-ajv-schema-validation-adoption
notes: "Implementation plan at plans/260512-1915-source-ref-uri-pattern-schema-adoption/plan.md; scout report at plans/reports/problem-solving-260512-1714-validate-records-simplification.md (Cascade 5); predecessor Phase A plan at plans/260512-1724-validator-simplification-pass/. plans/ is outside source_refs allowlist, cited here per the parent AJV-adoption decision's convention."
question: >-
  Should the source-ref URI prefix grammar (local|record|pack|legacy followed by a non-empty suffix) be enforced by AJV as a pattern on source_refs.items in the 5 record schemas, with the corresponding hand-rolled branches in tools/validate-records/record-validation-rules.js validateSourceRefs removed?
decision: >-
  Adopt AJV pattern "^(local|record|pack|legacy):.+" on source_refs.items in all 5 record schemas. Remove the unsupported-source-reference catchall and the pack: length-check branch from validateSourceRefs. Retain the legacy fixture-flag check, the local: realpath/allowlist check, and the record: cross-record existence check as hand-rolled because they encode ledger semantics, not URI grammar.
rationale: >-
  The hand-rolled prefix grammar duplicates what JSON Schema patterns express directly. The AJV-adoption decision already established that schema grammar is solved upstream and project code should own ledger semantics. This change closes the remaining gap between declared schema and enforced schema for source_refs. Per-prefix ledger checks remain hand-rolled because they touch the filesystem, cross-record id maps, or stateful test flags, none of which a JSON pattern can express.
alternatives:
  - Keep the hand-rolled prefix grammar. Rejected because it duplicates pattern-expressible logic and silently diverges from the schema declaration.
  - Use oneOf with per-prefix subschemas, one subschema per scheme with a different pattern. Rejected as overkill because the four prefixes share the trivial structure prefix-colon-payload and a single pattern is more readable.
  - Adopt ajv-formats and define a custom format for source-refs. Rejected for parity with the parent AJV decision, which avoided ajv-formats; a literal pattern is hermetic.
  - Extend pattern further, for example constrain record-suffix to a record-id grammar or local-suffix to a path-character class. Rejected as scope creep; deeper grammar belongs in ledger checks that already exist.
  - Bundle with pack-file schemas, Cascades 6 and 7. Rejected because scout report classifies each cascade as its own decision; bundling muddies the ledger.
tradeoffs:
  - Validator error wording for the two affected negative fixtures changes from unsupported source reference or malformed pack reference to AJV pattern wording. Negative fixture assertions update to match.
  - Pattern is permissive after the colon with .+, so any non-empty suffix passes. Per-prefix payload constraints continue to live in ledger checks. Acceptable because tightening pattern further would replicate ledger logic in schema.
  - source_refs uniqueness and per-record duplicate detection remain out of scope, consistent with AJV-adoption decision boundaries.
supersedes: []
