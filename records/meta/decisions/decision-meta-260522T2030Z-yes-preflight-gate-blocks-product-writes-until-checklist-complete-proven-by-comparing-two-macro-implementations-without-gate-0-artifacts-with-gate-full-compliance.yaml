question: Does preflight gate prevent cook-without-loop gap?
decision: "Yes. Preflight gate blocks product/** writes until checklist
  complete. Proven by comparing two macro implementations: without gate (0
  artifacts), with gate (full compliance)."
rationale: "Empirical proof: two identical tasks with identical tooling. First
  attempt (no preflight gate): 0 loop artifacts created, product code written
  first. Second attempt (with preflight gate): decision record created,
  preflight marked complete, plan approved, then product code written. The only
  variable was the gate enforcement."
alternatives:
  - Manual operator review
  - Agent memory/prompting
tradeoffs:
  - Gate complexity vs reliability
