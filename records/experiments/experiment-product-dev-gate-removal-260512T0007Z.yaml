source_refs:
  - record:claim-product-fastapi-reference
  - record:claim-product-tanstack-reference-view
goal: Verify that operator walkthrough of FastAPI Reference product surfaces works without requiring VNSTOCK_REFERENCE_LIVE_GATE environment variable.
hypothesis: The VNSTOCK_REFERENCE_LIVE_GATE check is verification-phase safety debt that now blocks product inspection without adding meaningful protection; removing it lets the operator walkthrough work out-of-the-box.
knowledge_pack_ids: []
method:
  - Started local FastAPI and Vite dev servers without VNSTOCK_REFERENCE_LIVE_GATE set.
  - Opened root route and verified landing page renders.
  - Followed equity list link and verified /reference/equity returns 200 with data.
  - Submitted a symbol search from root route and verified /reference/search returns 200 with results.
  - Followed a search result link to company detail and verified /reference/company/{symbol} returns 200.
success_metrics:
  - /reference/equity returns HTTP 200 without env var.
  - /reference/search returns HTTP 200 without env var.
  - /reference/company/{symbol} returns HTTP 200 without env var.
  - No raw provider values, credentials, config contents, or install logs retained.
result: supports
agent_outcome: Removed _ensure_live_reference_gate() and its three call sites from reference.py; all reference endpoints now serve data without env-var gate. Dev-server smoke checks pass.
product_outcome: supports
