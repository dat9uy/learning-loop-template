agent_outcome: >
  Critical script bug discovered and fixed: vnstock_data import is HOME-dependent.
  The vendor package reads its authentication config from $HOME/.vnstock during module import.
  Our script wrote config to API_HOME/.vnstock but checked import with default HOME.
  This caused false-negative post-flight failures in sandbox/containers.
  Fix: prefix all vnstock_data import checks with HOME=API_HOME.
  
  Script defensive features validated on error path:
  - Pre-flight checks catch missing dependencies early
  - Error interception translates vendor Vietnamese -> English guidance
  - Atomicity guard reports partial install state (package diff)
  - Next steps block gives actionable recovery commands
  
  Happy path installer behavior confirmed: device registers, vnstock_data downloads.
  Full end-to-end validation (idempotency + --force) blocked pending device clearance.
product_outcome: >
  Script bug fixed in product. install-vnstock.sh now preserves HOME for all post-flight checks.
  No production impact (script is install-time tooling). One slot consumed during test.
  Idempotency and --force tests deferred to next validation cycle after operator clearance.
