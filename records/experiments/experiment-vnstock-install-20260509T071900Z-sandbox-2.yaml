result: does-not-support
result_reason: account-os-device-limit-hit-after-sandbox-1-registered
agent_outcome: branch-7b-confirmed
product_outcome: none
observations:
  - No other intentional vnstock activity occurred between sandbox 1 and sandbox 2.
  - Vendor registration failed because bronze plan allowed 1 Linux device and 1 was already registered.
  - Installer continued after registration failure but could not download vnstock_data because the device was not registered.
  - vnstock_data import failed with ModuleNotFoundError.
  - Installer wrote API key material inside temp-local substrate, deleted with the container.
promotion_review:
  - Device-limit mechanism is account+OS-global for the observed subscription state.
  - Further clean-fingerprint reruns need operator device clearance or subscription/device-slot change.
