goal: Test whether a second fresh Linux Docker sandbox can install vnstock_data immediately after sandbox 1.
hypothesis: If metering is per-fingerprint only, a second clean Linux sandbox should also register and install; if metering is account+OS-global, sandbox 2 should hit the device limit.
