  - local:records/evidence/vnstock-data/experiment-install-prepared-substrate-20260513T173104Z.md
  - record:claim-vnstock-install-sandbox
notes: >
  Follow-up experiment to experiment-vnstock-install-prepared-substrate-20260513T173104Z.
  Tests two hypotheses critical to product/api/scripts/install-vnstock.sh viability:
  (1) Does the installer proceed when only requests and pandas are pre-installed
      (matching the actual product .venv after uv sync)?
  (2) Does setting HOME=/tmp/fake-home cause the installer to create .venv there
      instead of hardcoded /root/.venv?
goal: >
  Verify whether the vendor installer is compatible with the bootstrap script's
  expected substrate (requests + pandas pre-installed in a venv) and whether
  the bootstrap script's HOME override causes the installer to create .venv
  inside the product directory rather than at /root/.venv.
hypothesis: >
  (1) If only requests>=2.31.0 and pandas>=1.5.3 are pre-installed in a venv
      (no vnai, no vnstock), the vendor installer will still proceed past
      dependency checks, install its own prerequisites (vnai, vnii, typing_extensions),
      and reach the device-registration stage.
  (2) If HOME=/tmp/fake-home is set (simulating HOME="${API_HOME}" in the bootstrap
      script), the installer will create /tmp/fake-home/.venv rather than /root/.venv.
method:
  - "Start fresh python:3.11-slim container."
  - "Install system deps: wget, build-essential, curl, ca-certificates."
  - "Create /opt/test-venv and pre-install ONLY requests>=2.31.0 and pandas>=1.5.3."
  - "Set HOME=/tmp/fake-home, PATH=/opt/test-venv/bin:$PATH, VIRTUAL_ENV=/opt/test-venv."
  - "Download and run the vendor installer with API key from environment."
  - "Capture exit code, venv creation location, and whether /opt/test-venv is modified."
  - "Accept device-limit registration failure if it occurs; target is substrate compatibility and venv path."
  - "Audit temp files for secret material; remove container."
success_metrics:
  - installer-reaches-device-limit-or-succeeds
  - venv-path-follows-HOME-override
  - substrate-venv-left-unmodified
  - temp-root-cleaned-with-container
  - metadata-captured
result: confirmed
result_reason: >
  Both hypotheses are confirmed:
  (1) The installer proceeds successfully with only requests and pandas pre-installed.
      It installs vnai>=2.4.8, vnii>=0.2.1, and typing_extensions>=4.6.0 itself,
      then installs 35 dependency packages and reaches device registration.
  (2) The installer respects the HOME environment variable and creates .venv at
      $HOME/.venv (/tmp/fake-home/.venv). /root/.venv is NOT created.
      The bootstrap script's HOME="${API_HOME}" strategy is viable.
agent_outcome: >
  The bootstrap script (product/api/scripts/install-vnstock.sh) is viable:
  - The product .venv after uv sync contains requests and pandas, which is sufficient.
  - The installer itself handles vnai/vnii installation; pre-installing them is unnecessary.
  - The HOME override works: the installer creates .venv inside the product directory.
  - The substrate venv (/opt/test-venv analog = product/api/.venv) is left completely
    unmodified by the installer; all vendor packages go into the new $HOME/.venv.
  - The bootstrap script should NOT need to pre-install vnai or modify the product .venv.
product_outcome: >
  product/api/scripts/install-vnstock.sh does NOT require changes for substrate
  compatibility or venv-path behavior. The script's HOME override and PATH setting
  are confirmed to work as intended.
observations:
  - Installer SHA-256 observed: fad4bb7b86d23e853b09b9d7431ed7d49bcdc74b32551bbcb1fc19a095a830f2 (unchanged from prior experiment)
  - Pre-installed packages in /opt/test-venv: requests, pandas only (vnai, vnstock, vnstock_data correctly absent)
  - Installer proceeded past dependency checks without pre-installed vnai
  - Installer created /tmp/fake-home/.venv (respecting HOME override)
  - Installer did NOT create /root/.venv
  - /opt/test-venv was completely unmodified (no new packages installed)
  - Installer installed uv into /tmp/fake-home/.venv, then used uv to install 35 dependency packages
  - vnai>=2.4.8 and vnii>=0.2.1 were installed successfully via the installer
  - Device registration reached but failed with device-limit message (expected, 2-device Golden tier limit)
  - vnstock_data was NOT installed because device limit blocked sponsor package installation
  - API key material was written to /tmp/fake-home/.vnstock/api_key.json (expected config path, removed with container)
  - Container removed successfully via --rm
promotion_review:
  - Update claim-vnstock-install-sandbox to document that HOME override is respected and bootstrap script is viable
  - Document that vnai does NOT need to be pre-installed in the substrate; the installer handles it
  - Document that the product .venv (requests + pandas) is sufficient substrate
  - product/api/scripts/install-vnstock.sh is validated and does not require modification
  - Future work: direct pip install from vendor extra-index-url (open question 3)
