id: experiment-vnstock-direct-pip-20260514T140811Z
schema_version: "1.0"
type: experiment
status: approved
created_at: "2026-05-14T14:08:11Z"
updated_at: "2026-05-14T14:08:11Z"
source_refs:
  - local:records/evidence/vnstock-data/vendor-installation-troubleshooting-guide.md
notes: >
  Phase B of the follow-up experiment plan in docs/journals/260513-vnstock-bootstrap-substrate-experiment.md.
  Tests whether vnstock_data can be installed directly via pip from the vendor's
  extra-index URL without using the proprietary Makeself installer.
goal: >
  Determine whether direct pip install from the vendor index is a viable bypass strategy
  for the proprietary installer, and document the exact failure mode if not.
hypothesis: >
  pip install --extra-index-url https://vnstocks.com/api/simple vnstock_data will resolve
  the package from the vendor index and install it, providing a viable bypass around
  the Makeself installer and its device-registration requirement.
method:
  - "Probe https://vnstocks.com/api/simple with curl to determine index format."
  - "Probe https://vnstocks.com/api/simple/vnstock_data/ and normalized variants."
  - "Attempt direct pip install in fresh container with and without API key."
  - "Document index behavior, auth requirements, and failure modes."
success_metrics:
  - pip-resolves-vnstock-data-from-vendor-index
  - package-installs-without-installer
  - auth-requirements-documented
result: rejected
result_reason: >
  The vendor URL https://vnstocks.com/api/simple returns an HTML web page
  (Next.js application), not a PEP 503 simple API index.
  Sub-paths such as /api/simple/vnstock_data/ return JSON error
  {"error":"Package 'vnstock-data' not found"}.
  Direct pip install is not viable; the proprietary installer is the only
  supported delivery mechanism for vnstock_data.
agent_outcome: >
  Direct pip install bypass is impossible. The vendor does not expose a
  PEP 503-compatible package index. The Makeself installer performs proprietary
  device registration, API key validation, and package download/extraction
  that cannot be replicated with standard pip commands.
product_outcome: >
  No product changes required. The bootstrap script (product/api/scripts/install-vnstock.sh)
  remains the correct and only viable install path.
observations:
  - https://vnstocks.com/api/simple returns HTTP 200 with text/html (Next.js page titled "Kho Gói Python Vnstocks")
  - https://vnstocks.com/api/simple/vnstock_data/ returns JSON {"error":"Package 'vnstock-data' not found"}
  - https://vnstocks.com/api/simple/vnstock-data/ returns same error (normalized name)
  - https://vnstocks.com/api/packages/vnstock_data returns HTTP 404
  - pip install --extra-index-url with this URL hangs or fails because the endpoint is not a simple index
  - The vendor installer downloads packages through a proprietary mechanism not exposed via standard pip
promotion_review:
  - Document in install notes that pip bypass is not viable
  - Close the "direct pip install" open question permanently
  - No further action needed on this front
scope: install
output_level: metadata-only
