notes: >
  Continuation of the sandbox critique experiment documented in
  docs/journals/260514-vnstock-bootstrap-script-critique-session.md.
  The original run failed at device registration due to device limit exceeded.
  Operator cleared all device slots before this run.
  
  CRITICAL FINDING: Despite operator clearing all slots and the web UI showing
  only 1 device after the run, the installer still failed with device limit exceeded.
  This reveals a discrepancy between the vendor's visible device count and its
  internal limit enforcement.
  
  Slot state before run: 0/2 consumed (operator confirmed all cleared).
  Slot state after run: 1/2 visible in web UI, but installer claims limit exceeded.
goal: >
  Re-run the current install-vnstock.sh in a clean sandbox (mimicking fresh clone)
  with device slots cleared, to verify whether the script completes end-to-end
  when device limit is not the blocker.
hypothesis: >
  If the vendor installer is run in a clean sandbox with requests + pandas
  pre-installed in a venv, and device slots are available, the installer will:
  (1) Download and verify the installer via SHA-256
  (2) Install all 31+ dependencies into the venv
  (3) Successfully authenticate the API key
  (4) Successfully register a new device
  (5) Install vnstock_data and make it importable
  (6) The script will exit 0 with the import check passing
method:
  - "Start fresh python:3.11-slim container."
  - "Install system deps: wget, build-essential, curl, ca-certificates."
  - "Create /workspace and pre-install ONLY requests>=2.31.0 and pandas>=1.5.3 into .venv."
  - "Mount product/api/scripts/install-vnstock.sh into container."
  - "Run install-vnstock.sh from /workspace and capture exit code, stdout, stderr."
  - "Verify vnstock_data is importable from the resulting venv."
  - "Audit device slot consumption (ask operator to verify)."
  - "Audit temp files for secret material; remove container."
success_metrics:
  - script-exits-zero
  - vnstock-data-importable-after-run
  - device-registration-succeeds
  - venv-path-follows-HOME-override
  - api-key-authenticates
  - no-secrets-left-in-temp
  - metadata-captured
result: rejected
result_reason: >
  Hypothesis rejected. The installer proceeded through steps 2-5 successfully
  (Python selection, venv reuse, 31 dependencies installed, API key authenticated),
  but step 6 failed with device limit exceeded. Critically, the operator confirmed
  all device slots were cleared before the run, and the post-run web UI shows only
  1 device (the one created by this experiment).
  
  REFINED UNDERSTANDING (operator insight): The actual limit is 1 device (Bronze tier),
  not 2 as the vendor message claims. The vendor mislabels the tier as "Golden".
  More importantly, device REGISTRATION succeeded — the vendor server accepted the
  new device (visible in UI at 00:29:51). What "failed" was only the sponsor
  package (vnstock_data) download. From the vendor's perspective, this was a
  successful device registration that then hit the package-install block.
  Therefore: device.id creation DOES equal 1 slot consumed, even when the
  installer reports failure.
agent_outcome: >
  The current bootstrap script is NOT production-ready. Even with cleared device
  slots, the happy path fails because the actual vendor limit is 1 device (Bronze),
  not 2 as claimed. The non-atomic install leaves 31 packages + config + device.id
  in the venv after failure. Critically, every run that reaches step 6 consumes a
  device slot regardless of final exit code, because registration succeeds before
  the package-install block. The script rewrite (pre-flight checks, atomicity guard,
  stale-device detection, actionable errors) is confirmed necessary. Operator
  must be treated as secretary for slot state because agent cannot reliably
  infer vendor-side registration success from installer exit code.
product_outcome: >
  product/api/scripts/install-vnstock.sh requires defensive rewrite before
  production use. The vendor device-limit behavior is worse than previously
  understood: (1) actual limit is 1 (Bronze), not 2 (Golden), (2) every
  registration attempt consumes a slot even on "failure", (3) the vendor UI
  shows the registered device but provides no visibility into the true limit.
  Operator must manually audit and clear devices before each install attempt.
  The rewrite must include a --force mode that expects to re-register and
  warns about slot consumption.
observations:
