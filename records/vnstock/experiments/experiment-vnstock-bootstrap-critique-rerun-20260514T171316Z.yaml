  - Pre-installed packages in /workspace/.venv: requests, pandas only
  - Installer used existing /workspace/.venv (did not create a separate one)
  - Installer installed 31 dependencies successfully via uv
  - vnai 2.4.8, vnii 0.2.1, vnstock 4.0.2 installed successfully
  - API key authentication succeeded
  - Device registration reached but failed with device-limit message
  - device.id file was created despite device-limit failure
  - vnstock_data was NOT installed (sponsor packages blocked)
  - Script exit code: 1
  - Post-run web UI shows exactly 1 device: Linux-7.0.5-2-cachyos-x86_64-with-glibc2.41
  - Device registration time: 15/5/2026 00:29:51 (matches experiment runtime)
  - Vendor message claims 2-device-per-OS limit but enforces it at 1 visible device
  - Config files written to /workspace/.vnstock (api_key.json, device.id, etc.)
  - Container removed successfully
promotion_review:
  - Do not promote current install-vnstock.sh without rewrite
  - Document vendor device-limit discrepancy as known risk
  - Future experiment: test with host device also cleared to isolate fingerprinting behavior
