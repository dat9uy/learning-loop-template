id: decision-product-260522T2007Z-implement-macro-layer-api-with-economy-currency-and-commodity-endpoints-using-the-established-envelope-pattern-split-across-multiple-routers-to-keep-files-under-200-lines
schema_version: "1.0"
type: decision
status: draft
created_at: 2026-05-22T13:07:42Z
updated_at: 2026-05-22T13:07:42Z
source_refs:
  - local:constraint-gate-mcp
question: Should the macro layer (economy, currency, commodity domains) be
  implemented as FastAPI endpoints following the existing envelope-pattern
  reuse?
decision: Implement macro layer API with economy, currency, and commodity
  endpoints using the established envelope pattern, split across multiple
  routers to keep files under 200 lines.
rationale: The macro layer evidence (05-macro-layer.md) defines 3 domains with
  21 methods total. The existing reference and fundamental layers prove the
  envelope pattern works. Splitting into sub-routers (economy, currency,
  commodity) keeps files modular and under the 200-line limit.
alternatives:
  - "Implement only a subset of endpoints (rejected: evidence specifies full
    API)"
  - "Use a single monolithic router (rejected: would exceed 200 lines, violates
    dev rules)"
tradeoffs:
  - More files to manage vs better context window efficiency
  - Full endpoint coverage vs incremental delivery risk
supersedes: []
decision_effect:
  action: approve
  scope: product
  affected_refs:
    - product/api/src/routers/macro_*.py
    - product/api/src/models/macro.py
    - product/api/src/main.py
    - product/web/src/lib/macro-client.ts
    - product/web/src/routes/macro/*
    - product/web/src/components/Macro*.tsx
  boundaries:
    allowed_actions:
      - create router files
      - create model file
      - register router in main
      - create client lib
      - create frontend routes and components
      - add tests
    blocked_actions:
      - modify existing reference/fundamental endpoints
      - add caching layer
