id: experiment-product-macro-cook-no-loop-20260522T055121Z
schema_version: "1.0"
type: experiment
status: reviewed
created_at: "2026-05-21T22:51:21Z"
updated_at: "2026-05-22T08:51:21Z"
source_refs:
  - local:records/meta/evidence/skill-template-gap-260520T2133Z.md
  - record:decision-260512T0046Z-loop-meta-evidence-gap-revisit
notes: >
  Git archive branch: archive/macro-wrong-integration (preserves all 3 commits).
  Commits: 9fe41ae (feat), 181e1dc (test), d796d38 (docs/journal).
  The journal product/api/docs/journals/2026-05-22-1430-macro-layer-implementation.md
  only exists on the archive branch; it was removed from main by the hard reset.
  This experiment is a concrete instance of the gap class documented in
  skill-template-gap-260520T2133Z.md (unencoded decisions, evidence authority violation).
goal: >
  Test whether /ck:cook can implement a product feature (macro layer API)
  while automatically producing learning-loop records (claims, risks, decisions,
  experiments) as required by the learning-loop governance model.
hypothesis: >
  If /ck:cook is invoked with a plan for the macro layer, the implementation
  workflow will naturally integrate with the learning-loop system by producing
  or referencing pre-existing decision records, claims, and risks before writing
  product code, and will generate a post-implementation experiment record
  instead of a docs/journals developer log.
method:
  - "Invoke /ck:cook to implement macro layer for product/api."
  - "Observe whether pre-implementation checks for learning-loop decision records occur."
  - "Observe whether post-implementation learning-loop artifacts are created in records/."
  - "Compare actual output (docs/journals/) against expected output (records/)."
  - "Verify presence of claims, risks, decisions for macro layer in records/product/."
success_metrics:
  - pre-existing-decision-records-for-macro-layer
  - pre-existing-claim-records-for-macro-layer
  - pre-existing-risk-records-for-macro-layer
  - post-implementation-experiment-in-records-product-experiments
  - post-implementation-evidence-in-records-product-evidence
  - journal-in-records-not-docs
  - no-product-code-before-decision-coverage
result: does-not-support
result_reason: >
  Hypothesis rejected. /ck:cook produced product code (21 endpoints, 23 tests,
  Pydantic models, FastAPI router) without any pre-existing learning-loop records.
  No claims, risks, or decisions existed in records/product/ before implementation.
  Post-implementation output was a reactive developer journal in
  product/api/docs/journals/ instead of a proactive experiment/evidence record
  in records/product/. The learning-loop skill was never invoked; the coordination
  model collapse plan removed the old profile-based bridge but did not add a new
  integration between /ck:cook and the record system.
agent_outcome: >
  The /ck:cook skill operates as a pure implementation pipeline with no awareness
  of the learning-loop record system. The learning-loop skill currently only
  authors prompts; it does not hook into pre-implementation or post-implementation
  phases of /ck:cook. The journal that was produced (product/api/docs/journals/)
  is a high-quality developer log containing decisions, risks, and lessons, but it
  lives in the wrong system (docs/journals vs records/). This confirms the
  workflow gap identified in coordination-model-collapse Finding #12:
  "learning-loop skill purpose deleted but skill not repurposed."
product_outcome: none
