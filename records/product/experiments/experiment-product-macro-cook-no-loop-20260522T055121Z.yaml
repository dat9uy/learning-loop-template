    description: "feat(macro): implement macro layer with 21 endpoints"
    files_changed: 3
    product_code: true
  - git_commit_test: 181e1dc
    description: "test(macro): add 23 unit tests and stubs for macro layer"
    files_changed: 3
    product_code: true
  - git_commit_docs: d796d38
    description: "docs(macro): add implementation plan and journal entry"
    files_changed: 2
    product_code: false
    journal_location: product/api/docs/journals/
    correct_location: records/product/experiments/
  - records_pre_check:
    claims_in_records_product: 0
    risks_in_records_product: 0
    decisions_in_records_product: 0
    experiments_in_records_product_macro_related: 0
  - records_post_check:
    claims_created: 0
    risks_created: 0
    decisions_created: 0
    experiments_created: 0
  - learning_loop_skill_invoked: false
    reason: /ck:cook does not invoke /learning-loop and no wrapper exists
promotion_review:
  - Do not promote /ck:cook as a standalone product-build tool until loop integration is added.
  - Repurpose learning-loop skill or create a wrapper skill that chains loop pre-checks + cook implementation + loop post-capture.
  - Decision records must exist before any product code for a new surface is written.
  - Archive branch archive/macro-wrong-integration preserves the code for reference but must not be merged without loop compliance.
scope: product
