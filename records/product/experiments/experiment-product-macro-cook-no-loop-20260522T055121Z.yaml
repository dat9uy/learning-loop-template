id: experiment-product-macro-cook-no-loop-20260522T055121Z
schema_version: "1.0"
type: experiment
status: rejected
created_at: 2026-05-21T22:51:21Z
updated_at: 2026-05-22T13:26:21Z
source_refs:
    - record:assertion-meta-static-skill-template-gaps
notes: Superseded by
    experiment-product-260522T2020Z-implement-the-vnstock-macro-layer-economy-currency-commodity-in-the-product-with-full-learning-loop-compliance-contrasting-with-the-previous-failed-attempt
    and
    decision-product-260522T2026Z-adopt-preflight-gate-as-mandatory-for-all-product-writes.
goal: >
    Test whether /ck:cook can implement a product feature (macro layer API) while
    automatically producing learning-loop records (claims, risks, decisions,
    experiments) as required by the learning-loop governance model.
hypothesis: >
    If /ck:cook is invoked with a plan for the macro layer, the implementation
    workflow will naturally integrate with the learning-loop system by producing
    or referencing pre-existing decision records, claims, and risks before writing
    product code, and will generate a post-implementation experiment record
    instead of a docs/journals developer log.
method:
    - Invoke /ck:cook to implement macro layer for product/api.
    - Observe whether pre-implementation checks for learning-loop decision records
      occur.
    - Observe whether post-implementation learning-loop artifacts are created in
      records/.
    - Compare actual output (docs/journals/) against expected output (records/).
    - Verify presence of claims, risks, decisions for macro layer in
      records/product/.
success_metrics:
    - pre-existing-decision-records-for-macro-layer
    - pre-existing-claim-records-for-macro-layer
    - pre-existing-risk-records-for-macro-layer
    - post-implementation-experiment-in-records-product-experiments
    - post-implementation-evidence-in-records-product-evidence
    - journal-in-records-not-docs
    - no-product-code-before-decision-coverage
result: does-not-support
result_reason: >
    Hypothesis rejected. /ck:cook produced product code (21 endpoints, 23 tests,
    Pydantic models, FastAPI router) without any pre-existing learning-loop
    records. No claims, risks, or decisions existed in records/product/ before
    implementation. Post-implementation output was a reactive developer journal in
    product/api/docs/journals/ instead of a proactive experiment/evidence record
    in records/product/. The learning-loop skill was never invoked; the
    coordination model collapse plan removed the old profile-based bridge but did
    not add a new integration between /ck:cook and the record system.
agent_outcome: Hypothesis rejected. /ck:cook produced product code without
    pre-implementation learning-loop records. However, this failure was
    subsequently resolved by the preflight gate implementation
    (plans/260522-pre-flight-gate-positive-contract). The successful macro layer
    implementation (experiment-product-260522T2020Z) proves that with a mechanical
    gate enforcing the preflight checklist, agents DO create decision records and
    complete loop artifacts before writing product code.
product_outcome: "The preflight gate positive contract
    (decision-product-260522T2026Z) now supersedes the conditions of this failed
    experiment. Product builds now require: (1) workflow_product_build
    decomposition, (2) decision records via MCP, (3) risk records via MCP, (4)
    validate_records, (5) mark_preflight_complete, (6) then retry write."
observations:
    - git_commit_feat: 9fe41ae
      description: "feat(macro): implement macro layer with 21 endpoints"
      files_changed: 3
      product_code: true
    - git_commit_test: 181e1dc
      description: "test(macro): add 23 unit tests and stubs for macro layer"
      files_changed: 3
      product_code: true
    - git_commit_docs: d796d38
      description: "docs(macro): add implementation plan and journal entry"
      files_changed: 2
      product_code: false
      journal_location: product/api/docs/journals/
      correct_location: records/product/experiments/
    - records_pre_check: null
      claims_in_records_product: 0
      risks_in_records_product: 0
      decisions_in_records_product: 0
      experiments_in_records_product_macro_related: 0
    - records_post_check: null
      claims_created: 0
      risks_created: 0
      decisions_created: 0
      experiments_created: 0
    - learning_loop_skill_invoked: false
      reason: /ck:cook does not invoke /learning-loop and no wrapper exists
promotion_review:
    - Do not promote /ck:cook as a standalone product-build tool until loop
      integration is added.
    - Repurpose learning-loop skill or create a wrapper skill that chains loop
      pre-checks + cook implementation + loop post-capture.
    - Decision records must exist before any product code for a new surface is
      written.
    - Archive branch archive/macro-wrong-integration preserves the code for
      reference but must not be merged without loop compliance.
scope: product
output_level: metadata-only
output_capture:
    allowed_outputs:
        - metadata
        - commit-hashes
        - branch-names
        - file-counts
        - record-presence-checks
    blocked_outputs:
        - raw-data-capture
        - credential-capture
        - product-code-capture
        - temp-dirs
        - venvs
