goal: Verify operator can inspect the FastAPI Reference and TanStack Reference product shape through local dev routes without manual URL editing.
hypothesis: The bootstrap surfaces, search box, equity-to-company links, and search-result links let operator inspect product shape end-to-end without retaining raw provider data.
method:
  - Started local FastAPI and Vite dev servers.
  - Opened root route and verified landing route shape.
  - Followed equity list link and symbol link to company detail.
  - Submitted a redacted ticker-class search from root route.
  - Followed a search result link to company detail.
success_metrics:
  - Root route returns HTTP 200.
  - Equity list route returns HTTP 200 and renders schema shape.
  - Company detail route returns HTTP 200 from linked symbol navigation.
  - Search returns nonzero result count for redacted ticker-class query.
  - No raw provider values, identifiers, credentials, config contents, screenshots, or install logs retained.
result: supports
agent_outcome: Dev-server smoke checks, web build, web smoke tests, and schema-shape walkthrough completed.
product_outcome: supports
observations:
  - route: /
    status_code: 200
    component:
      - LandingPage
      - SearchBox
    navigation: root route rendered
  - route: /reference/equity
    status_code: 200
    component: EquityTable
    columns:
      - symbol
      - org_name
    row_count: 1742
    navigation: symbol cells linked to company route
  - route: /reference/company/{symbol}
    status_code: 200
    component: CompanyDetail
    columns:
