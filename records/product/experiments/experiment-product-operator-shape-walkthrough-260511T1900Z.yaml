      - name
      - sector
      - profile
      - listing_date
      - issued_share
    row_count: 1
  - route: /reference/search
    status_code: 200
    component: SearchBox
    columns:
      - symbol
      - org_name
    row_count: 1
    navigation: result symbol linked to company route
