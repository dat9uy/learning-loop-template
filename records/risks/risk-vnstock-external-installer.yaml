notes: >
  Vendor officially documents the Makeself installer path, Docker integration,
  and non-interactive mode. Risk severity elevated: the installer is an external
  binary without published checksums, AND the vendor misrepresents both tier
  (claims "Golden", actual is Bronze) and device limit (claims 2 per OS,
  actual is 1). Most critically, device registration succeeds and consumes
  a slot even when the installer subsequently reports "failure" due to limit.
  From the vendor's perspective, the device was successfully registered;
  only the sponsor package download is blocked.
risk_statement: >
  External Makeself .run installer from vnstocks.com with multiple vendor-side
  inconsistencies: tier mislabeling, device limit misrepresentation, and
  asymmetric failure semantics where device registration consumes a slot
  independently of package installation success.
category: security
severity: high
likelihood: high
confidence: high
mitigation:
  blocked_actions:
    - credential-capture
    - raw-data-export
    - live-provider-calls
    - unattended-device-registration
  required_gates:
    - human-approval
    - temp-directory
    - metadata-only-output
    - device-slot-secretary-check
