id: capability-fastapi-reference-rest
schema_version: "1.0"
type: capability
status: approved
created_at: "2026-05-11"
updated_at: "2026-05-11"
source_refs:
  - record:claim-product-fastapi-reference
  - local:product/api/capabilities/vnstock-data/capability-01-reference.py
stack: api
surface: HTTP/REST
maps:
  - source: vnstock_data.Reference.equity.list
    route_class: GET /reference/equity
    response_class: EquityListResponse
  - source: vnstock_data.Reference.company(symbol).info
    route_class: GET /reference/company/{symbol}
    response_class: CompanyInfoResponse
  - source: vnstock_data.Reference.search.symbol
    route_class: GET /reference/search
    response_class: SymbolSearchResponse
supersedes: []
