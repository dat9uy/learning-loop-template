# GitHub Actions CI for the learning-loop-template.
#
# Runs `pnpm test` on every PR open / sync and surfaces results as a required
# check. The per-namespace runner (`tools/scripts/run-pnpm-test-namespaced.mjs`)
# mirrors progress to `.test-logs/<ns>.log`; the full suite completes in ~15s on
# 9 namespaces / ~1100 tests.
#
# Node version matches the local dev environment (.nvmrc-equivalent: Node 24).
# pnpm version is pinned explicitly via pnpm/action-setup `version: 11` to
# mirror local pnpm 11.8.0. Action majors track latest stable per
# plans/reports/research-260623-1142-github-actions-versions-audit-report.md.

name: test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # permissions: required by fallow-rs/fallow@v2 for `sarif: true` Code Scanning upload
    # (deep-dive §7.4). `contents: read` covers actions/checkout@v7; `security-events: write`
    # is the only NEW scope vs the previous repo-default token.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        # fetch-depth: 0 is required by `fallow audit --changed-since <base.sha>`
        # (PR gate). With the default fetch-depth=1, the base SHA is missing
        # from the local clone and fallow fails with
        # "Invalid symmetric difference expression <base>...HEAD". Mirrors the
        # pattern used by meta-state-pr-body-advisory.yml:24.
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cold-session probe tests
        # Runs the cold-session discoverability probe (manifest tool count,
        # gap-close resolution, hints) — these are real tests, not a freshness
        # gate. The probe also writes .cold-session-sentinel.json as a side
        # effect; that sentinel is gitignored local state consumed by
        # `pnpm check:freshness` (a separate, time-based gate that lives outside
        # the regression suite so calendar-age failures aren't mistaken for
        # code regressions).
        run: pnpm test:cold-session

      - name: Run test suite
        run: pnpm test

      - name: Resolve fallow version
        # D1: Read the CLI version from package.json so there's one bump site
        # (rule-tool-integration-same-commit-dep 4th item context). The Action's
        # `version:` input pins the CLI binary; floating this is the same drift
        # class this plan closes (deep-dive §5.4, §12.5). The package.json
        # `fallow` dep is the source of truth.
        id: fallow-version
        run: |
          version=$(node -e 'console.log(require("./package.json").devDependencies.fallow)')
          if [ -z "$version" ]; then
            echo "::error::package.json devDependencies.fallow is missing or empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved fallow version: $version"

      - name: Fallow audit (PR gate)
        id: analyze    # exposes steps.analyze.outputs.sarif for the patch step below
        if: github.event_name == 'pull_request'
        # Pinned to commit SHA per rule-tool-integration-same-commit-dep 4th item
        # (third-party Action SHA pin + crypto verify). The Action verifies the CLI
        # binary via Ed25519 + SHA-256 + sentinel (deep-dive §4). Bumping the SHA
        # is a deliberate supply-chain update — never use `@v3` here.
        # Resolved via `git ls-remote https://github.com/fallow-rs/fallow refs/tags/v3.3.0`
        # on 2026-07-13; revisitable via `tools/learning-loop-mastra/scripts/refresh-action-sha.sh`
        # (out of scope for this plan; tracked as F-5).
        # `sarif: false` disables the Action's built-in codeql-action/upload-sarif
        # step (which rejects fallow's multi-run SARIF via areAllRunsUnique).
        # The workflow's own jq patch + upload step ingests the SARIF instead
        # (plan 260630-0536-fallow-action-swap-with-sarif-split phase 2).
        uses: fallow-rs/fallow@c9326d9395c0b46f4077290473060b3e950b6e8c
        with:
          root: tools/learning-loop-mastra
          command: audit
          gate: new-only
          format: sarif
          sarif: false    # Action's built-in upload disabled (see comment above)
          version: ${{ steps.fallow-version.outputs.version }}
          # Baselines live in-package at <root>/baselines/fallow/ (rule
          # baseline-storage, 3rd item). Path is relative to `root:` above,
          # NOT to the workflow file. Old `plans/<plan-dir>/reports/fallow/`
          # paths are deprecated (D3 — CI must not depend on plans folder).
          dead-code-baseline: baselines/fallow/dead-code-baseline.json
          health-baseline:    baselines/fallow/health-baseline.json
          dupes-baseline:     baselines/fallow/dupes-baseline.json
          # Feed c8 Istanbul coverage so Fallow scores per-function CRAP from real
          # coverage instead of assuming 0% (which inflates CRAP to comp×(comp+1)
          # and fails the gate on every new function with cyclomatic ≥ ~5). Mirrors
          # the local `pnpm fallow:gate` script (package.json) so local pre-commit
          # and CI agree on CRAP. Coverage is emitted by the c8-wrapped `pnpm test`
          # step above (c8 is a devDependency in the same commit — see
          # rule-tool-integration-same-commit-dep). Paths are absolute because
          # Fallow resolves `--coverage` relative to `root:`; `--coverage-root`
          # strips the checkout prefix so paths match the root-relative analysis.
          args: --coverage ${{ github.workspace }}/coverage/coverage-final.json --coverage-root ${{ github.workspace }}/tools/learning-loop-mastra

      - name: Patch fallow SARIF per analyzer (jq)
        # Idempotent: runs with automationDetails.id already set (or null) are
        # passed through. For runs where automationDetails is missing, null, or
        # an empty object { }, this sets automationDetails.id based on the rule
        # ID prefix so codeql-action's areAllRunsUnique validator accepts the
        # multi-run SARIF (plan 260630-0536 §"Corrected design").
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          SARIF_INPUT="${{ steps.analyze.outputs.sarif }}"
          if [ -z "$SARIF_INPUT" ] || [ ! -s "$SARIF_INPUT" ]; then
            echo "SARIF input is missing or empty (likely a non-PR event); skipping patch"
            exit 0
          fi
          SARIF_OUTPUT="$(realpath --relative-base="$GITHUB_WORKSPACE" "${SARIF_INPUT%.sarif}-patched.sarif")"

          # Pre-checks: file exists, is non-empty, has SARIF schema, is under 50 MB
          if [ ! -s "$SARIF_INPUT" ]; then
            echo "::error::SARIF input is missing or empty: $SARIF_INPUT"
            exit 1
          fi
          if [ "$(wc -c < "$SARIF_INPUT")" -gt 52428800 ]; then
            echo "::error::SARIF input exceeds 50 MB cap: $(wc -c < "$SARIF_INPUT") bytes"
            exit 1
          fi
          if ! jq -e '."$schema" | test("sarif-2\\.1")' "$SARIF_INPUT" > /dev/null; then
            echo "::error::SARIF input missing sarif-2.1 schema"
            exit 1
          fi

          # Drop results that carry no location. fallow emits its
          # `fallow/code-duplication` clone-group summaries with locations: null
          # (a clone group spans multiple regions and has no single primary
          # location), and GitHub Code Scanning rejects any location-less result
          # with `locationFromSarifResult: expected at least one location`, which
          # fails the whole upload. The Fallow audit gate (previous step) still
          # enforces the duplication policy; this filter only affects what Code
          # Scanning can surface, and location-less results can't be surfaced
          # there anyway.
          DROPPED=$(jq '[.runs[].results[] | select(.locations == null or (.locations | length == 0))] | length' "$SARIF_INPUT")
          if [ "$DROPPED" -gt 0 ]; then
            echo "::warning::Dropped $DROPPED fallow SARIF result(s) with no location (fallow code-duplication clone-group summaries carry no SARIF location). The Fallow audit gate still enforces the duplication policy."
          fi

          # Atomic write: write to .tmp then rename, so a failed jq leaves no partial file
          TMP_OUTPUT="${SARIF_OUTPUT}.tmp"
          jq '
            .runs |= map(
              if ((.automationDetails | type) == "null") or
                 ((.automationDetails | type) == "object" and (.automationDetails | length == 0))
              then
                .automationDetails = {
                  id: (
                    if (.tool.driver.rules[0].id // "" | test("^fallow/(unused|private|duplicate-export|unlisted)-"))
                    then "fallow/audit/dead-code"
                    elif (.tool.driver.rules[0].id // "" | test("^fallow/(high|low|long|duplicated)-"))
                    then "fallow/audit/health"
                    else "fallow/audit/dupes"
                    end
                  )
                }
              else .
              end
              | .results |= map(select(.locations != null and (.locations | length > 0)))
            )
          ' "$SARIF_INPUT" > "$TMP_OUTPUT"

          mv "$TMP_OUTPUT" "$SARIF_OUTPUT"
          echo "Patched SARIF written to $SARIF_OUTPUT"

      - name: Upload fallow SARIF to Code Scanning
        if: success() && github.event_name == 'pull_request'
        # SHA-pinned per rule-tool-integration-same-commit-dep item 4 (third-party
        # Action SHA pin). The single explicit upload of the patched SARIF under
        # `category: fallow`. Resolved via
        # `git ls-remote https://github.com/github/codeql-action refs/tags/v4`
        # on 2026-06-30.
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          sarif_file: fallow-results-patched.sarif
          category: fallow

      - name: Upload per-namespace logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: .test-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload fallow SARIF on failure
        # Preserves the patched SARIF on failure so the next session can read
        # the actual CI output (rule IDs + locations) instead of the truncated
        # public log. Without this, diagnosing a future CI-vs-local divergence
        # requires re-running with debug logs.
        # Path is the patched file (same as the upload step's source) so the
        # failure artifact matches what would have been uploaded to Code
        # Scanning. The patch step is idempotent and deterministic.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fallow-sarif
          path: fallow-results-patched.sarif
          if-no-files-found: ignore
          retention-days: 7
