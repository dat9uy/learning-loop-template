# GitHub Actions CI for the learning-loop-template.
#
# Runs `pnpm test` on every PR open / sync and surfaces results as a required
# check. The per-namespace runner (`tools/scripts/run-pnpm-test-namespaced.mjs`)
# mirrors progress to `.test-logs/<ns>.log`; the full suite completes in ~15s on
# 9 namespaces / ~1100 tests.
#
# Node version matches the local dev environment (.nvmrc-equivalent: Node 24).
# pnpm version is pinned explicitly via pnpm/action-setup `version: 11` to
# mirror local pnpm 11.8.0. Action majors track latest stable per
# plans/reports/research-260623-1142-github-actions-versions-audit-report.md.

name: test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        # fetch-depth: 0 is required by `fallow audit --changed-since <base.sha>`
        # (PR gate). With the default fetch-depth=1, the base SHA is missing
        # from the local clone and fallow fails with
        # "Invalid symmetric difference expression <base>...HEAD". Mirrors the
        # pattern used by meta-state-pr-body-advisory.yml:24.
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed cold-session sentinel
        # AGENTS.md §8: fresh checkouts must run `pnpm test:cold-session` once
        # to seed .cold-session-sentinel.json. The cold-session-freshness
        # test in the regular suite asserts the sentinel exists and is < 3
        # days old. Running test:cold-session here seeds it for this run;
        # the artifact is gitignored.
        run: pnpm test:cold-session

      - name: Run test suite
        run: pnpm test

      - name: Fallow audit (PR gate)
        if: github.event_name == 'pull_request'
        run: |
          cd tools/learning-loop-mastra
          # Baselines live in the plan dir (committed to git); the local
          # .fallow/baselines/ cache is gitignored. CI reads from the plan
          # so the gate works on a fresh checkout.
          pnpm exec fallow audit \
            --root . \
            --gate new-only \
            --dead-code-baseline ../../plans/260627-2042-phase-e-dead-code-sweep/reports/fallow/dead-code-baseline.json \
            --health-baseline    ../../plans/260627-2042-phase-e-dead-code-sweep/reports/fallow/health-baseline.json \
            --dupes-baseline     ../../plans/260627-2042-phase-e-dead-code-sweep/reports/fallow/dupes-baseline.json \
            --changed-since "${{ github.event.pull_request.base.sha || 'origin/main' }}" \
            --format sarif \
            --output-file reports/fallow/audit.sarif

      - name: Split SARIF into per-analyzer files
        # CodeQL Action v4 enforces "one SARIF run per category per upload".
        # fallow audit emits a single SARIF file with 3 runs (dead-code,
        # health, dupes) sharing the same category — v4 rejects that.
        # Split into per-analyzer files so each can be uploaded under its
        # own category.
        if: success() && github.event_name == 'pull_request'
        run: |
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path("tools/learning-loop-mastra/reports/fallow/audit.sarif")
          data = json.loads(src.read_text())
          runs = data.get("runs", [])
          if len(runs) <= 1:
              # Nothing to split; leave the original file in place for the
              # first upload step.
              print(f"Single run in SARIF ({len(runs)}); no split needed.")
              raise SystemExit(0)

          # Classify each run by its results (most reliable signal — these are
          # the findings fallow actually emitted) and fall back to rule IDs.
          # `code-duplication` is the unique dupes marker; `duplicate-export`
          # is a dead-code rule, so we must match the full substring.
          def classify(run):
              result_ids = {r.get("ruleId", "").lower() for r in run.get("results", [])}
              rule_ids = {r.get("id", "").lower() for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
              for ids in (result_ids, rule_ids):
                  if any("code-duplication" in i for i in ids):
                      return "fallow-dupes"
                  if any(i for i in ids if "complex" in i or "crap" in i or "refactor" in i):
                      return "fallow-health"
                  if any(i for i in ids if "unused" in i or "unreachable" in i or "private-type" in i or "circular" in i or "duplicate-export" in i):
                      return "fallow-deadcode"
              return None

          base = {k: data[k] for k in ("$schema", "version") if k in data}
          seen = set()
          written = []
          for i, run in enumerate(runs):
              cat = classify(run) or f"fallow-{i}"
              # If classification collides (rare), append the run index.
              uniq = cat if cat not in seen else f"{cat}-{i}"
              seen.add(uniq)

              # CodeQL requires every result to have at least one location.
              # fallow's code-duplication findings represent clone GROUPS
              # across files (not a single line), so they arrive with no
              # `locations`. Strip those — if a run ends up with zero
              # locatable results, don't write the file (the corresponding
              # upload step uses hashFiles() to skip itself).
              locatable = [r for r in run.get("results", []) if r.get("locations")]
              if not locatable:
                  print(f"run {i} -> {uniq}: skipped (no locatable results; "
                        f"results={len(run.get('results', []))})")
                  continue
              pruned = {**run, "results": locatable}
              out = pathlib.Path(f"tools/learning-loop-mastra/reports/fallow/audit-{uniq}.sarif")
              out.write_text(json.dumps({**base, "runs": [pruned]}, indent=2))
              print(f"run {i} -> {uniq} (locatable_results={len(locatable)}, "
                    f"dropped={len(run.get('results', [])) - len(locatable)})")
              written.append(uniq)

          # Remove the original (multi-run) SARIF so the legacy upload step
          # can't accidentally find it.
          src.unlink()
          print(f"Written: {written}")

          - name: Upload SARIF (fallow-deadcode)
        if: success() && github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tools/learning-loop-mastra/reports/fallow/audit-fallow-deadcode.sarif
          category: fallow-deadcode

      - name: Upload SARIF (fallow-health)
        if: success() && github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tools/learning-loop-mastra/reports/fallow/audit-fallow-health.sarif
          category: fallow-health

      - name: Upload SARIF (fallow-dupes)
        # `if: hashFiles(...) != ''` skips this step when the Split step
        # did not write a SARIF file for dupes (which happens when fallow
        # emits no locatable dupes results, i.e. clone groups without
        # per-file locations).
        if: success() && github.event_name == 'pull_request' && hashFiles('tools/learning-loop-mastra/reports/fallow/audit-fallow-dupes.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tools/learning-loop-mastra/reports/fallow/audit-fallow-dupes.sarif
          category: fallow-dupes

      - name: Upload per-namespace logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: .test-logs/
          if-no-files-found: ignore
          retention-days: 7
