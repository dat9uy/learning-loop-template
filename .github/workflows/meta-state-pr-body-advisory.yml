# Meta-state registry delta advisory
# Runs on PRs touching meta-state.jsonl OR change-log.jsonl; emits delta
# summary to $GITHUB_STEP_SUMMARY.
#
# Per finding meta-260622T1708Z; path filter + diff-command updated in
# Plan 260715-0801 Tier 1 Phase 2 step 7 (Red Team F6) to include
# change-log.jsonl in the migration PR's diff coverage.
#
# Plan 260715-1608 Phase 1 (red-team F6) backstop: the post-merge
# `meta-state-refs-check.yml` BLOCK validator exempts `consolidates` /
# `supersedes` refs from immutable change-logs as `historical` — by
# construction, change-logs cannot be patched, so this exemption is
# permanent. To catch typos / fabricated refs BEFORE the change-log is
# rendered immutable, the "Emit delta summary" step now FAILS the check
# when a NEW unresolved `consolidates` or `supersedes` ref is detected on
# the PR's added change-log lines. Non-change-log diffs stay advisory
# (cross-PR orphans self-heal on merge).
name: Meta-state registry delta advisory

on:
  pull_request:
    paths:
      - 'meta-state.jsonl'
      - 'change-log.jsonl'

permissions:
  contents: read
  pull-requests: read

jobs:
  registry-deltas:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base ref
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1 2>/dev/null || \
            git fetch "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "$GITHUB_BASE_REF" --depth=1
        continue-on-error: true

      - name: Diff registry
        run: |
          set -euo pipefail
          # Diff both registry files. The script concatenates diffs of each
          # file; the per-line id extraction tolerates either kind.
          {
            git diff --unified=0 "origin/$GITHUB_BASE_REF"...HEAD -- meta-state.jsonl || true
            echo "--- change-log.jsonl ---"
            git diff --unified=0 "origin/$GITHUB_BASE_REF"...HEAD -- change-log.jsonl || true
          } > /tmp/registry.diff

      - name: Emit delta summary
        run: tools/scripts/ci-registry-deltas.sh /tmp/registry.diff

      - name: Check PR body sections
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.body || '';
            const sections = [
              'Swept entries',
              'Resolved entries',
              'New entries',
              'Promoted rules',
              'Superseded entries',
              'Archived entries',
            ];
            for (const s of sections) {
              const re = new RegExp(`^## ${s}\\s*\\n([^#]+)`, 'm');
              const m = body.match(re);
              if (!m || m[1].trim().length === 0) {
                core.warning(`PR body section "${s}" is empty or missing`);
              }
            }
