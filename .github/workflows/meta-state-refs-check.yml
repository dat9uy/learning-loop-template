# Plan 260715-0801 Tier 1 Phase 3 step 4: post-merge registry-ref BLOCK.
#
# Runs on push to main. Loads the union of meta-state.jsonl + change-log.jsonl,
# uses `validate-registry-refs.mjs` to scan for real dangling refs (target id
# missing, kind-mismatch, stale-view, superseded, resolved), and BLOCKs on
# any.
#
# Why post-merge: at push-to-main the full union is visible, so every dangling
# ref is real. Cross-PR orphans either self-healed on merge or never existed.
# Pre-merge cross-PR detection was down-tiered (Validation Session 1 Q3).
#
# The validator reuses the relationships-handler dangling-refs logic
# (Red Team F4: `meta_state_relationships` plural, NOT `meta_state_relationship_validate`
# singular — the latter is a description-string linter, no-op here).
#
# Mode toggle: the validator exits 1 on real orphans. The workflow uses
# `continue-on-error: true` so the FIRST push after migration does NOT BLOCK
# — pre-existing orphans in the registry (98 entries reference deleted or
# truncated targets) need operator cleanup first. Once cleanup lands, the
# operator flips the workflow to BLOCK by removing `continue-on-error: true`
# from the `Validate registry refs` step.

name: meta-state refs check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refs-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Node 24 mirror the test workflow. No install required —
      # `validate-registry-refs.mjs` is a pure-Node script with no deps.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate registry refs (post-merge BLOCK; WARN-mode pre-cleanup)
        # `continue-on-error: true` keeps the workflow green while pre-existing
        # orphans (98 missing refs) are cleaned up. Flip to BLOCK by removing
        # this line after the orphan-cleanup PR merges.
        continue-on-error: true
        run: node tools/learning-loop-mastra/scripts/validate-registry-refs.mjs --root=$GITHUB_WORKSPACE