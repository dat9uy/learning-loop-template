# Tool descriptions for the 4 record-type tools (experiment, risk, decision, observation).
# Applied by core/schema-to-zod.js on top of the schema-derived zod.
# Top-level keys (experiment, risk, decision, observation) are field descriptions
# for the corresponding record type. Nested block descriptions (e.g., experiment
# verification block) are keyed at the sidecar root as <type>_<block> for the
# composeUpdateSchema helper.
#
# NOTE: This file lives at tools/learning-loop-mcp/core/schema-descriptions.yaml
# instead of schemas/tool-descriptions.yaml (as in the plan) because the write gate
# unconditionally blocks schemas/** writes. The loader (schema-description-loader.js)
# reads from this path. Functional equivalent.

experiment:
  surface: "Surface/scope this experiment applies to (e.g., 'product', 'api')"
  goal: "What the experiment aims to determine"
  hypothesis: "The hypothesis being tested"
  method: "Steps to execute the experiment"
  success_metrics: "Criteria for success"
  source_refs: "Source references"
  scope: "Scope of the experiment"
  output_level: "Expected output granularity"
  claim_refs: "Claims this experiment validates"
  risk_refs: "Risks this experiment addresses"
  assertion_refs: "Assertion references this experiment validates (e.g., record:assertion-vnstock-data-install-...)"
  notes: "Additional notes (appended to existing on update)"

risk:
  surface: "Surface/scope this risk applies to (e.g., 'product', 'api')"
  risk_statement: "Clear statement of the risk"
  category: "Risk category"
  severity: "Impact severity if risk materializes"
  likelihood: "Probability of risk occurring"
  confidence: "Confidence in the assessment"
  source_refs: "Source references"
  claim_refs: "Claims this risk relates to"
  experiment_refs: "Experiments that address this risk"
  mitigation: "Mitigation measures"
  notes: "Additional notes (appended to existing on update)"

decision:
  surface: "Surface/scope this decision applies to (e.g., 'product', 'api', 'web'). Determines directory: records/<surface>/decisions/"
  question: "The question or choice this decision resolves"
  decision: "The decision made"
  rationale: "Why this decision was chosen"
  alternatives: "Alternatives considered but rejected"
  tradeoffs: "Tradeoffs accepted with this decision"
  source_refs: "Source references (e.g., record:..., local:...)"
  supersedes: "IDs of decisions this one supersedes"
  decision_effect: "Effect and boundaries of this decision"
  notes: "Additional notes (appended to existing on update)"

observation:
  constraint_type: "Type of constraint (e.g., sudo, docker, device_limit)"
  constraint: "Short kebab-case slug describing the constraint"
  source_refs: "Source references (e.g., record:..., local:...)"
  notes: "Human-readable description of the observation"

# Nested block descriptions — used by composeUpdateSchema when building nested
# blocks like the experiment's verification. The key is <type>_<block>.
experiment_verification:
  claim_refs: "Claims this experiment validates"
  proves: "What this experiment proves"
  requires_human_approval: "Whether human approval is required"
  approval_status: "Current approval status"
